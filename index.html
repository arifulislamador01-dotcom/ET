<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ET - স্মার্ট লার্নিং প্ল্যাটফর্ম | ফরিদপুর পলিটেকনিক</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        html.light body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0f9ff 100%);
            color: #0f172a;
        }

        /* ============= ANIMATIONS ============= */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(14, 165, 233, 0.3); }
            50% { box-shadow: 0 0 35px rgba(14, 165, 233, 0.6); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .animate-slide-right {
            animation: slideInRight 0.6s ease-out forwards;
        }
        .animate-glow {
            animation: glowPulse 2.5s ease-in-out infinite;
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* ============= GLASS EFFECT ============= */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(14, 165, 233, 0.2);
        }
        html.light .glass {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(14, 165, 233, 0.3);
        }

        /* ============= GRADIENTS ============= */
        .gradient-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 100%);
        }
        .gradient-primary-animated {
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 50%, #ec4899 100%);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
        }

        /* ============= CARDS ============= */
        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(71, 85, 105, 0.4);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }
        html.light .card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(203, 213, 225, 0.6);
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(14, 165, 233, 0.6);
            box-shadow: 0 20px 30px -12px rgba(14, 165, 233, 0.25);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #8b5cf6, #ec4899);
        }

        /* ============= BUTTONS ============= */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            color: white;
            box-shadow: 0 4px 14px rgba(14, 165, 233, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.6);
        }
        .btn-ghost {
            background: transparent;
            color: #0ea5e9;
            border: 1.5px solid #0ea5e9;
        }
        .btn-ghost:hover {
            background: rgba(14, 165, 233, 0.1);
        }

        /* ============= SIDEBAR ============= */
        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(14, 165, 233, 0.2);
            overflow-y: auto;
            z-index: 1000;
            transition: all 0.3s;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            color: #cbd5e1;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            cursor: pointer;
            border-radius: 0 12px 12px 0;
            margin: 4px 12px;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(14, 165, 233, 0.15);
            color: #0ea5e9;
            border-left-color: #0ea5e9;
        }

        /* ============= MAIN CONTENT ============= */
        .main-content {
            margin-left: 280px;
            min-height: 100vh;
            padding: 1.5rem 2rem;
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }

        /* ============= LOGIN PAGE ============= */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 10% 20%, rgba(14,165,233,0.15), transparent 70%);
            position: relative;
        }
        .login-box {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(14, 165, 233, 0.4);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            animation: fadeInUp 0.8s;
        }
        html.light .login-box {
            background: rgba(255, 255, 255, 0.95);
        }
        .selection-option {
            padding: 10px;
            border: 1.5px solid rgba(71, 85, 105, 0.5);
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .selection-option.active {
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            border-color: transparent;
            color: white;
        }

        /* ============= PROGRESS BAR ============= */
        .progress-bar {
            height: 8px;
            background: #334155;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #8b5cf6);
            width: 0%;
            border-radius: 20px;
        }

        /* ============= NOTIFICATION ============= */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
            animation: slideInRight 0.4s;
            font-weight: 500;
        }
        .notification.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
        }
        .circuit-svg { max-width: 100%; border-radius: 20px; }
    </style>
</head>

        t(key) { return this.translations[this.currentLanguage][key] || key; },

        init() {
            const savedTheme = localStorage.getItem('et_theme');
            if(savedTheme === 'light') this.isDark = false;
            this.applyTheme();
            document.addEventListener('click', (e) => {
                if(e.target.closest('[data-nav]')) {
                    const page = e.target.closest('[data-nav]').dataset.nav;
                    this.currentPage = page;
                    this.render();
                }
                if(e.target.closest('.theme-toggle')) {
                    this.isDark = !this.isDark;
                    localStorage.setItem('et_theme', this.isDark ? 'dark' : 'light');
                    this.applyTheme();
                    this.render();
                }
                if(e.target.closest('[data-lang]')) {
                    this.currentLanguage = e.target.closest('[data-lang]').dataset.lang;
                    this.render();
                }
                if(e.target.closest('[data-logout]')) {
                    this.isLoggedIn = false;
                    this.currentPage = 'login';
                    this.render();
                }
                if(e.target.closest('.semester-opt')) {
                    document.querySelectorAll('.semester-opt').forEach(el => el.classList.remove('active'));
                    e.target.classList.add('active');
                    this.userSemester = parseInt(e.target.dataset.val);
                }
                if(e.target.closest('.shift-opt')) {
                    document.querySelectorAll('.shift-opt').forEach(el => el.classList.remove('active'));
                    e.target.classList.add('active');
                    this.userShift = parseInt(e.target.dataset.val);
                }
                if(e.target.closest('[data-login-action]')) {
                    const rollInput = document.querySelector('#loginRoll');
                    const regInput = document.querySelector('#loginReg');

                        this.currentUser.semester = this.userSemester;
                        this.currentUser.shift = this.userShift;
                        this.showNotif(this.currentLanguage === 'bn' ? 'লগইন সফল!' : 'Login success!');

                        this.render();

                        this.showNotif(this.currentLanguage === 'bn' ? 'ভুল রোল বা রেজিস্ট্রেশন' : 'Invalid credentials', true);
                    }
                }
                if(e.target.closest('[data-continue]')) {
                    if(this.userSemester && this.userShift) {
                        this.isLoggedIn = true;
                        this.currentUser.semester = this.userSemester;
                        this.currentUser.shift = this.userShift;
                        this.currentPage = 'dashboard';
                        this.render();
                    } else this.showNotif(this.t('selectSemester') + ' & ' + this.t('selectShift'), true);
                }
            });
            this.render();
        },
        applyTheme() {
            if(this.isDark) document.documentElement.classList.remove('light');
            else document.documentElement.classList.add('light');
        },

            const div = document.createElement('div');
            div.className = 'notification' + (isErr ? ' error' : '');
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2800);

        },
        renderNavbar() {
            return `<nav class="bg-black/20 backdrop-blur-md border-b border-white/10 px-8 py-4 flex justify-between items-center sticky top-0 z-50"><div><h1 class="text-xl font-bold flex gap-2"><i class="fas fa-bolt text-blue-400"></i> ET Platform</h1><p class="text-xs opacity-70">${this.currentLanguage==='bn'?'ফরিদপুর পলিটেকনিক ইনস্টিটিউট':'Faridpur Polytechnic'}</p></div><div class="flex gap-4"><div class="theme-toggle cursor-pointer w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fas fa-${this.isDark?'sun':'moon'}"></i></div><div class="w-10 h-10 rounded-full overflow-hidden border-2 border-blue-400"><img src="${this.currentUser.profilePhoto}" class="w-full h-full object-cover"></div></div></nav>`;
        },
        renderDashboard() {
            const subjectsArr = Object.values(subjects);
            const avgAttendance = Math.round(subjectsArr.reduce((a,b)=>a+b.attendance,0)/subjectsArr.length);
            return `
            <div class="flex"><div class="sidebar">${this.renderSidebar()}</div><div class="flex-1 flex flex-col"><div>${this.renderNavbar()}</div><main class="main-content"><div class="gradient-primary-animated p-6 rounded-2xl text-white shadow-xl mb-8 animate-fade-in-up"><h2 class="text-3xl font-bold">⚡ ${this.t('greeting')}, ${this.currentUser.name}!</h2><p>${this.currentLanguage==='bn'?'সেমিস্টার '+this.currentUser.semester+'ম শিফট '+ (this.currentUser.shift===1?'১ম':'২য়') : 'Semester '+this.currentUser.semester+' Shift '+this.currentUser.shift}</p></div><div class="grid md:grid-cols-3 gap-6 mb-8"><div class="card"><div class="flex justify-between"><span>${this.t('subjects')}</span><i class="fas fa-book text-blue-400 text-2xl"></i></div><p class="text-3xl font-bold mt-2">${subjectsArr.length}</p><p class="text-sm opacity-70">${this.currentLanguage==='bn'?'এ সেমিস্টারে':'This semester'}</p></div><div class="card"><div class="flex justify-between"><span>উপস্থিতি</span><i class="fas fa-check-circle text-green-400 text-2xl"></i></div><p class="text-3xl font-bold mt-2">${avgAttendance}%</p><div class="progress-bar mt-2"><div class="progress-fill" style="width:${avgAttendance}%"></div></div></div><div class="card"><div class="flex justify-between"><span>GPA</span><i class="fas fa-chart-line text-purple-400 text-2xl"></i></div><p class="text-3xl font-bold mt-2">${this.currentUser.gpa}</p></div></div><div class="card p-4"><h3 class="text-xl font-bold mb-3">📖 ${this.t('currentClass')}</h3><div class="flex flex-wrap gap-6"><div><p class="text-sm opacity-70">${this.t('teacher')}</p><p class="font-semibold">Razzak Karim</p></div><div><p class="text-sm opacity-70">${this.t('room')}</p><p>103</p></div><div><p class="text-sm opacity-70">${this.t('time')}</p><p>10:15 - 11:00</p></div></div></div><div class="text-center mt-12 pt-6 border-t border-white/10 text-sm opacity-60">© 2024 ET Platform - Developed by Ridoy Hossen Arif</div></main></div></div>`;
        },
        renderSubjects() {
            return `<div class="flex"><div class="sidebar">${this.renderSidebar()}</div><div class="flex-1"><div>${this.renderNavbar()}</div><main class="main-content"><h2 class="section-title">📘 ${this.t('subjects')}</h2><div class="grid md:grid-cols-2 gap-6">${Object.values(subjects).map(s=>`<div class="card"><div><div class="flex justify-between"><h3 class="font-bold text-lg">${s.name}</h3><span class="text-xs bg-blue-500/20 px-3 py-1 rounded-full">${s.code}</span></div><p class="text-sm opacity-70">${s.teacher}</p><div class="mt-3 space-y-2"><div><div class="flex justify-between text-sm"><span>কুইজ</span><span>${Math.round(s.quizMarks.reduce((a,b)=>a+b,0)/s.quizMarks.length)}/25</span></div><div class="progress-bar"><div class="progress-fill" style="width:${(Math.round(s.quizMarks.reduce((a,b)=>a+b,0)/s.quizMarks.length)/25)*100}%"></div></div></div><div><div class="flex justify-between text-sm"><span>উপস্থিতি</span><span>${s.attendance}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${s.attendance}%"></div></div></div></div></div></div>`).join('')}</div></main></div></div>`;
        },
        renderQuiz() {
            return `<div class="flex"><div class="sidebar">${this.renderSidebar()}</div><div class="flex-1"><div>${this.renderNavbar()}</div><main class="main-content"><h2 class="section-title">🧠 ${this.t('quiz')}</h2><div class="card mb-6"><h3 class="font-bold">ইলেকট্রিক্যাল কুইজ চ্যালেঞ্জ</h3><p class="text-sm opacity-70">৩টি প্রশ্নের উত্তর দিন</p></div>${[1,2,3].map(q=>`<div class="card mb-4"><p class="font-semibold">${q}. ${q===1?'তিন ফেজ ইন্ডাকশন মোটরের ঘূর্ণন গতি কত?' : q===2?'ট্রান্সফর্মারে শক্তি স্থানান্তর হয় কীভাবে?':'প্রটেকশন সিস্টেমে আর্থিং কেন?'}</p><div class="grid grid-cols-2 gap-3 mt-3">${['সিঙ্ক্রোনাস গতি','চৌম্বক ক্ষেত্র','ক্ষতিকর তড়িৎ প্রবাহকে পৃথিবীতে পাঠাতে','সবগুলো'].slice(0,4).map(opt=>`<div class="glass p-2 rounded-xl text-center text-sm cursor-pointer hover:bg-blue-500/20">${opt}</div>`).join('')}</div></div>`).join('')}<button class="btn btn-primary w-full mt-4">সাবমিট & স্কোর দেখুন</button></main></div></div>`;
        },
        renderChat() {
            return `<div class="flex"><div class="sidebar">${this.renderSidebar()}</div><div class="flex-1"><div>${this.renderNavbar()}</div><main class="main-content"><h2 class="section-title">💬 ${this.t('chat')}</h2><div class="grid md:grid-cols-3 gap-6"><div class="card"><h3 class="font-bold">শিক্ষকবৃন্দ</h3>${teachers.slice(0,4).map(t=>`<div class="p-2 border-b border-white/10 cursor-pointer hover:bg-white/5"><p class="font-semibold">${t.name}</p><p class="text-xs opacity-70">${t.subject}</p></div>`).join('')}</div><div class="card md:col-span-2 h-96 flex flex-col"><div class="flex-1 overflow-y-auto space-y-3 p-2"><div class="bg-blue-500/20 p-3 rounded-xl w-fit">স্যার, আজকের ক্লাসের নোট পাব?</div><div class="bg-purple-500/20 p-3 rounded-xl w-fit ml-auto">হ্যাঁ, রিসোর্স সেকশনে আপলোড করে দেব।</div></div><div class="flex gap-2 mt-4"><input class="flex-1 glass rounded-full px-4 py-2" placeholder="মেসেজ লিখুন..."><button class="btn btn-primary rounded-full"><i class="fas fa-paper-plane"></i></button></div></div></div></main></div></div>`;
        },
        renderResources() {
            return `<div class="flex"><div class="sidebar">${this.renderSidebar()}</div><div class="flex-1"><div>${this.renderNavbar()}</div><main class="main-content"><h2 class="section-title">📂 ${this.t('resources')}</h2><div class="grid md:grid-cols-3 gap-5">${[1,2,3,4,5,6].map(i=>`<div class="card"><i class="fas fa-file-pdf text-3xl text-red-400 mb-2"></i><h3 class="font-bold">লেকচার শীট ${i}</h3><p class="text-sm opacity-70">AC Machine / Power System</p><button class="btn btn-primary text-sm mt-3 w-full"><i class="fas fa-download"></i> ডাউনলোড</button></div>`).join('')}</div></main></div></div>`;
        },
        renderTeachers() {
            return `<div class="flex"><div class="sidebar">${this.renderSidebar()}</div><div class="flex-1"><div>${this.renderNavbar()}</div><main class="main-content"><h2 class="section-title">👨‍🏫 ${this.t('teachers')}</h2><div class="grid md:grid-cols-3 gap-6">${teachers.map(t=>`<div class="card text-center"><div class="w-20 h-20 mx-auto rounded-full gradient-primary flex items-center justify-center text-2xl mb-3"><i class="fas fa-chalkboard-user"></i></div><h3 class="font-bold">${t.name}</h3><p class="text-sm opacity-80">${t.subject}</p><a href="https://wa.me/${t.whatsapp}" target="_blank" class="btn btn-primary w-full mt-3 text-sm"><i class="fab fa-whatsapp"></i> WhatsApp</a></div>`).join('')}</div></main></div></div>`;
        },
        renderExam() {
            return `<div class="flex"><div class="sidebar">${this.renderSidebar()}</div><div class="flex-1"><div>${this.renderNavbar()}</div><main class="main-content"><h2 class="section-title">📅 ${this.t('exam')}</h2><div class="grid gap-5">${exams.map(ex=>`<div class="card flex justify-between items-center flex-wrap"><div><h3 class="font-bold text-xl">${ex.name}</h3><p class="text-sm opacity-70">তারিখ: ${ex.date} | বিষয়: ${ex.subjects.join(', ')}</p></div><span class="px-4 py-1 rounded-full ${ex.status==='সম্পন্ন'?'bg-green-500/30':'bg-yellow-500/30'}">${ex.status}</span></div>`).join('')}</div></main></div></div>`;
        },
        renderSyllabus() {
            return `<div class="flex"><div class="sidebar">${this.renderSidebar()}</div><div class="flex-1"><div>${this.renderNavbar()}</div><main class="main-content"><h2 class="section-title">📖 ${this.t('syllabus')}</h2><div class="grid gap-5">${Object.entries(syllabus).map(([code,desc])=>`<div class="card"><div class="flex justify-between"><h3 class="font-bold">${subjects[code]?.name || code}</h3><span class="text-xs bg-blue-500/20 px-3 py-1 rounded-full">${code}</span></div><p class="mt-2 text-sm">${desc}</p></div>`).join('')}</div></main></div></div>`;
        },
        renderProfile() {
            return `<div class="flex"><div class="sidebar">${this.renderSidebar()}</div><div class="flex-1"><div>${this.renderNavbar()}</div><main class="main-content"><h2 class="section-title">👤 ${this.t('profile')}</h2><div class="grid md:grid-cols-2 gap-6"><div class="card text-center"><img src="${this.currentUser.profilePhoto}" class="w-32 h-32 rounded-full mx-auto border-4 border-blue-400"><h3 class="text-xl font-bold mt-3">${this.currentUser.name}</h3><p>Roll: ${this.currentUser.roll}</p><p class="text-sm opacity-70">${this.currentUser.department}</p></div><div class="card space-y-3"><p><strong>📧 ইমেইল:</strong> ${this.currentUser.email}</p><p><strong>📞 ফোন:</strong> ${this.currentUser.phone}</p><p><strong>🎓 সেমিস্টার:</strong> ${this.currentUser.semester}ম</p><p><strong>⏰ শিফট:</strong> ${this.currentUser.shift===1?'১ম':'২য়'}</p><p><strong>📜 রেজিস্ট্রেশন:</strong> ${this.currentUser.registration}</p><button class="btn btn-primary w-full mt-4"><i class="fas fa-edit"></i> প্রোফাইল এডিট (ডেমো)</button></div></div></main></div></div>`;
        },
        render() {
            const appDiv = document.getElementById('app');
            if(!this.isLoggedIn) appDiv.innerHTML = this.renderLogin();
            else {
                if(this.currentPage === 'dashboard') appDiv.innerHTML = this.renderDashboard();
                else if(this.currentPage === 'subjects') appDiv.innerHTML = this.renderSubjects();
                else if(this.currentPage === 'quiz') appDiv.innerHTML = this.renderQuiz();
                else if(this.currentPage === 'chat') appDiv.innerHTML = this.renderChat();
                else if(this.currentPage === 'resources') appDiv.innerHTML = this.renderResources();
                else if(this.currentPage === 'teachers') appDiv.innerHTML = this.renderTeachers();
                else if(this.currentPage === 'exam') appDiv.innerHTML = this.renderExam();
                else if(this.currentPage === 'syllabus') appDiv.innerHTML = this.renderSyllabus();
                else appDiv.innerHTML = this.renderProfile();
            }
        }
    };
    app.init();
</script>
</body>
</html>
